<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Hub</title>

  <link rel="icon" href="https://img.icons8.com/emoji/96/rocket.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="warp"></canvas>

<!-- 🌌 WELCOME -->
<div id="welcome">
  <div class="welcome-card">
    <div class="orb"></div>
    <h1>ORBIT HUB</h1>
    <p>Enter your universe</p>
    <button onclick="enterSite()">ENTER</button>
  </div>
</div>

<!-- 🆕 WHATS NEW PANEL -->
<div id="whatsNew">
  <div class="panel">
    <h2>🚀 What's New?</h2>
    <ul>
      <li>Added game icons 🎮</li>
      <li>New UI layout ✨</li>
      <li>Improved navigation 🚀</li>
    </ul>
    <button onclick="closeWhatsNew()">Got it</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="sidebar">
    <button onclick="route('home')">🏠</button>
    <button onclick="route('games')">🎮</button>
    <button onclick="route('search')">🔍</button>
    <button onclick="route('about')">ℹ️</button>
  </div>

  <div class="main">

    <div class="topbar">
      <input id="searchInput" placeholder="Search games..." />
      <button onclick="handleSearch()">Search</button>
    </div>

    <div id="view" class="page"></div>

  </div>
</div>

<!-- GAME PLAYER -->
<div id="playmode">
  <div id="gameHeader">
    <h2 id="gameTitle"></h2>
    <button onclick="exitGame()">Exit</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
